<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicklist - Lista de Compras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <button class="btn-back" aria-label="Voltar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="header-content">
                <h1 class="title">Compras da Semana</h1>
                <p class="subtitle">Gerencie seus itens facilmente</p>
            </div>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="itemInput" 
                    class="item-input" 
                    placeholder="Adicionar um novo item"
                    autocomplete="off"
                >
                <button class="btn-add" id="btnAdd">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Adicionar item
                </button>
            </div>
        </section>

        <!-- List Section -->
        <section class="list-section">
            <ul class="shopping-list" id="shoppingList">
                <!-- Items will be inserted here by JavaScript -->
            </ul>
        </section>

        <!-- Alert Message -->
        <div class="alert" id="alert"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
